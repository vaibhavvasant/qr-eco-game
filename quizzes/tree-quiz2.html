<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trees Quiz — Step by Step</title>
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn" title="Leaderboard">🏆</button>
    <div class="status">
      <span class="streak" title="Streak">🔥 3</span>
      <span class="health" title="Health">❤️ 3</span>
      <button class="icon-btn profile" title="Profile">👤</button>
    </div>
  </header>

  <!-- Main quiz area -->
  <main>
    <div class="card">
      <h1>Trees Quiz — Step by Step</h1>
      <p class="hint">Select the correct option to move to the next question.</p>

      <section id="quiz-container" class="question-area" aria-live="polite">
        <!-- Questions injected by quiz.js -->
      </section>

      <div class="controls">
        <div class="progress" id="progress"></div>
        <div style="flex:1"></div>
        <button id="restartBtn" class="small-btn" style="display:none">Restart</button>
      </div>
    </div>
  </main>

  <!-- Reward modal -->
  <div id="reward-modal" class="reward-modal" hidden>
    <div class="reward-content" role="dialog" aria-modal="true" aria-labelledby="reward-title">
      <button id="closeReward" class="close-btn" aria-label="Close">✕</button>
      <h2 id="reward-title">🎉 New Character Unlocked!</h2>
      <img id="reward-img" src="" alt="Unlocked character image">
      <p id="reward-name" class="reward-name"></p>
      <button id="viewCollection" class="collect-btn">Go to Collection</button>
    </div>
  </div>

  <!-- ----- Quiz data for this page ----- -->
  <script>
    // quiz type (used by awardCharacter)
    const QUIZ_TYPE = "tree";

    // questions array used by the shared engine
    const QUESTIONS = [
  { q: `Cutting too many trees is called_____?`, opts: ["Afforestation", "Deforestation", "Plantation", "Reforestation"], correct: 1 },
  { q: `Trees give us which gas that we need to breathe?`, opts: ["Oxygen", "Carbon dioxide", "Nitrogen", "Methane"], correct: 0 },
  { q: `The school plans a new garden. Best time to water plants is:`, opts: ["Mid-day", "Early morning or evening", "Midnight only", "When it rains"], correct: 1 },
  { q: `Which fruit tree also improves soil fertility by fixing nitrogen?`, opts: ["Lemon", "Guava", "Mango", "Jamun"], correct: 1 },
  { q: `Which tree is known for its ability to release oxygen even at night?`, opts: ["Peepal", "Mango", "Gulmohar", "Neem"], correct: 0 }
];
  </script>

  <!-- shared reward/character logic (already in your project) -->
  <script src="awardCharacter.js"></script>

  <!-- shared quiz engine -->
  <script src="quiz.js"></script>
</body>
</html>
